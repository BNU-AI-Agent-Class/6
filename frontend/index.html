<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留学生情绪梳理 Agent</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --sidebar: #f1f1ef;
      --ink: #2f2f2d;
      --muted: #777773;
      --line: #e4e4e0;
      --accent: #5f5f5b;
      --accent-dark: #3f3f3c;
      --accent-soft: #eaeae6;
      --warm: #d8d5ce;
      --claude-yellow: #d7a06d;
      --danger: #b44747;
      --danger-soft: #f6dedb;
      --user: #eeeeeb;
      --bot: #ffffff;
      --font-size: 15px;
      --shadow: 0 16px 44px rgba(31, 31, 29, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr);
      transition: grid-template-columns 0.2s ease;
    }

    .app.sidebar-collapsed {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 72px 18px 20px;
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      overflow: hidden;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .sidebar-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      min-width: 0;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--ink);
      background: #e2e1dc;
      box-shadow: none;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.22;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .quick-card,
    .history-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.64);
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .quick-card {
      display: grid;
      gap: 10px;
    }

    .history-card {
      display: grid;
      gap: 10px;
    }

    .quick-title,
    .card-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .quick-btn,
    .secondary-btn,
    .danger-btn,
    .settings-btn {
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      padding: 10px 12px;
      text-align: left;
      color: var(--ink);
      background: #ffffff;
      border: 1px solid var(--line);
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .quick-btn:hover,
    .secondary-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(47, 111, 115, 0.45);
      background: var(--accent-soft);
    }

    .danger-btn {
      color: #695b59;
      background: transparent;
      border-color: var(--line);
      font-weight: 800;
    }

    .danger-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(180, 71, 71, 0.5);
    }

    .history-list {
      display: grid;
      gap: 6px;
      max-height: 230px;
      overflow: auto;
    }

    .history-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 32px;
      gap: 6px;
      align-items: center;
      padding: 7px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid transparent;
    }

    .history-item.active {
      border-color: rgba(47, 111, 115, 0.5);
      background: var(--accent-soft);
    }

    .history-title {
      min-width: 0;
      padding: 4px;
      color: var(--ink);
      background: transparent;
      text-align: left;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .trash-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      color: var(--danger);
      background: #ffffff;
      border: 1px solid var(--line);
    }

    .sidebar-bottom {
      margin-top: auto;
      display: grid;
      gap: 10px;
    }

    .collapse-btn,
    .icon-btn {
      min-width: 42px;
      height: 42px;
      border-radius: 8px;
      color: var(--accent-dark);
      background: #ffffff;
      border: 1px solid var(--line);
      font-weight: 800;
    }

    .collapse-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 18;
      font-size: 0;
      background: transparent;
      border-color: transparent;
    }

    .collapse-btn::before {
      content: "☰";
      font-size: 22px;
      font-weight: 400;
    }

    .collapse-btn:hover {
      background: var(--accent-soft);
    }

    .settings-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #ffffff;
      border: 1px solid var(--line);
      font-weight: 800;
    }

    .app.sidebar-collapsed .sidebar {
      width: 0;
      min-width: 0;
      padding: 0;
      border-right: 0;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-100%);
    }

    .main {
      grid-column: 2;
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px 18px 72px;
      border-bottom: 1px solid var(--line);
      background: rgba(247, 247, 245, 0.94);
    }

    .top-title {
      min-width: 0;
    }

    .top-title strong {
      display: block;
      font-size: 16px;
    }

    .top-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn:hover {
      background: var(--accent-soft);
    }

    .chat {
      min-height: 0;
      overflow-y: auto;
      padding: 28px 24px;
    }

    .messages {
      width: min(820px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: min(680px, 92%);
      align-items: flex-start;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .avatar-stack {
      width: 48px;
      flex: 0 0 48px;
      display: grid;
      justify-items: center;
      gap: 5px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: #3f3024;
      background: var(--claude-yellow);
      font-size: 13px;
      font-weight: 800;
    }

    .message.user .avatar {
      background: var(--claude-yellow);
      color: #3f3024;
    }

    .avatar-name {
      width: 58px;
      color: var(--muted);
      font-size: 11px;
      text-align: center;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .bubble {
      margin-top: 0;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--bot);
      box-shadow: none;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 15px;
    }

    .message.user .bubble {
      color: var(--ink);
      background: var(--user);
      border-color: var(--line);
    }

    .message.crisis .bubble {
      border-color: rgba(180, 71, 71, 0.35);
      background: #fff7f5;
    }

    .message.thinking .bubble {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .thinking-dots {
      display: inline-flex;
      gap: 3px;
    }

    .thinking-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      animation: thinking-pulse 1.1s infinite ease-in-out;
    }

    .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes thinking-pulse {
      0%, 70%, 100% { opacity: 0.25; transform: translateY(0); }
      35% { opacity: 1; transform: translateY(-2px); }
    }

    .message.system {
      align-self: center;
      max-width: min(640px, 100%);
    }

    .message.system .avatar {
      display: none;
    }

    .message.system .avatar-stack {
      display: none;
    }

    .message.system .bubble {
      color: var(--muted);
      background: rgba(255, 255, 255, 0.64);
      text-align: center;
      font-size: 13px;
      box-shadow: none;
    }

    .composer-wrap {
      padding: 16px 24px 22px;
      border-top: 1px solid var(--line);
      background: rgba(247, 247, 245, 0.96);
    }

    .composer-shell {
      width: min(820px, 100%);
      margin: 0 auto;
      position: relative;
    }

    .emoji-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 10px);
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 5;
    }

    .emoji-panel.open {
      display: grid;
    }

    .emoji-btn {
      min-height: 38px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid var(--line);
      font-size: 20px;
    }

    .emoji-group {
      display: grid;
      grid-template-columns: repeat(3, minmax(36px, 1fr));
      gap: 6px;
      padding: 8px;
      border-radius: 8px;
      background: #f7f7f5;
    }

    .emoji-group-label {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
    }

    .composer {
      display: grid;
      grid-template-columns: 46px 1fr auto;
      gap: 8px;
      align-items: end;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(31, 31, 29, 0.06);
    }

    .plus-btn {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      color: var(--accent-dark);
      background: #ffffff;
      border: 1px solid var(--line);
      font-size: 22px;
      line-height: 1;
    }

    textarea {
      width: 100%;
      min-height: 38px;
      max-height: 150px;
      resize: vertical;
      border: 0;
      padding: 8px 4px;
      color: var(--ink);
      background: transparent;
      line-height: 1.5;
      outline: none;
    }

    textarea:focus {
      box-shadow: none;
    }

    .send-btn {
      min-width: 74px;
      min-height: 38px;
      border-radius: 8px;
      color: #ffffff;
      background: var(--accent);
      font-weight: 800;
    }

    .send-btn:hover {
      background: var(--accent-dark);
    }

    .send-btn:disabled,
    .danger-btn:disabled,
    .quick-btn:disabled {
      opacity: 0.58;
      cursor: wait;
      transform: none;
    }

    .helper {
      width: min(820px, 100%);
      margin: 9px auto 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(38, 49, 47, 0.28);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .settings-modal {
      width: min(760px, 100%);
      max-height: min(760px, 92vh);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .settings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .settings-head strong {
      font-size: 17px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      min-height: 36px;
      padding: 8px 13px;
      border-radius: 8px;
      color: var(--muted);
      background: #ffffff;
      border: 1px solid var(--line);
      white-space: nowrap;
    }

    .tab.active {
      color: var(--ink);
      background: var(--accent-soft);
      border-color: #d3d3ce;
    }

    .tab-panel {
      display: none;
      overflow: auto;
      padding: 18px;
    }

    .tab-panel.active {
      display: grid;
      gap: 14px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px 11px;
      color: var(--ink);
      outline: none;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 28px;
      flex: 0 0 48px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #c8c4bd;
      transition: 0.18s ease;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 22px;
      height: 22px;
      left: 3px;
      top: 3px;
      border-radius: 50%;
      background: #ffffff;
      transition: 0.18s ease;
    }

    .switch input:checked + .slider {
      background: #777773;
    }

    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }

    .backup-list {
      display: grid;
      gap: 8px;
    }

    .backup-item {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 820px) {
      .app {
        display: block;
      }

      .sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: min(320px, calc(100vw - 48px));
        z-index: 15;
        border-right: 1px solid var(--line);
        padding: 72px 18px 20px;
      }

      .quick-card {
        display: none;
      }

      .main {
        width: 100%;
        height: auto;
        min-height: calc(100vh - 186px);
      }

      .topbar {
        padding: 14px 16px 14px 72px;
      }

      .chat {
        padding: 18px 14px;
      }

      .composer-wrap {
        padding: 12px 14px 16px;
      }

      .message {
        max-width: 100%;
      }

      .top-title span {
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 19px;
      }

      .top-actions {
        gap: 6px;
      }

      .icon-btn {
        min-width: 38px;
        height: 38px;
      }

      .composer {
        grid-template-columns: 38px minmax(0, 1fr) 56px;
      }

      .send-btn {
        width: auto;
        min-width: 56px;
      }

      .emoji-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <button class="collapse-btn" id="collapseSidebar" type="button" title="展开或收起侧边栏" aria-label="展开或收起侧边栏"></button>
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="mark" aria-hidden="true">AI</div>
          <div class="brand-text">
            <h1>留学生情绪梳理 Agent</h1>
            <p class="subtitle">先接住情绪，再一起把事情看清楚。不会诊断，也不会替你下定义。</p>
          </div>
        </div>
      </div>

      <button class="danger-btn" id="crisisButton" type="button"><span>我需要紧急帮助</span></button>

      <div class="quick-card">
        <div class="quick-title">可以从这里开始</div>
        <button class="quick-btn" type="button" data-prompt="今天室友在食堂看到我了，没打招呼，我有点难受">室友没打招呼</button>
        <button class="quick-btn" type="button" data-prompt="我总觉得自己融不进去，明明也想和大家熟一点">感觉融不进去</button>
        <button class="quick-btn" type="button" data-prompt="我想试一个很小的社交行动，但不想太尴尬">想试一个小行动</button>
      </div>

      <button class="secondary-btn" id="newChat" type="button"><span>新对话</span></button>

      <div class="history-card">
        <div class="card-title">历史对话</div>
        <div class="history-list" id="historyList"></div>
      </div>

      <div class="sidebar-bottom">
        <button class="settings-btn" id="settingsButton" type="button" title="设置" aria-label="设置">⚙ <span class="settings-label">设置</span></button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="top-title">
          <strong id="sessionTitle">今天想聊点什么？</strong>
          <span id="stageText">阶段：等待输入</span>
        </div>
      </header>

      <section class="chat" aria-label="聊天记录">
        <div class="messages" id="messages"></div>
      </section>

      <section class="composer-wrap">
        <div class="composer-shell">
          <div class="emoji-panel" id="emojiPanel" aria-label="表情包面板">
            <div class="emoji-group"><span class="emoji-group-label">平静</span><button class="emoji-btn" type="button" data-emoji="🙂">🙂</button><button class="emoji-btn" type="button" data-emoji="😌">😌</button><button class="emoji-btn" type="button" data-emoji="🌿">🌿</button></div>
            <div class="emoji-group"><span class="emoji-group-label">难过</span><button class="emoji-btn" type="button" data-emoji="😔">😔</button><button class="emoji-btn" type="button" data-emoji="🥲">🥲</button><button class="emoji-btn" type="button" data-emoji="😭">😭</button></div>
            <div class="emoji-group"><span class="emoji-group-label">焦虑</span><button class="emoji-btn" type="button" data-emoji="😟">😟</button><button class="emoji-btn" type="button" data-emoji="😰">😰</button><button class="emoji-btn" type="button" data-emoji="🫨">🫨</button></div>
            <div class="emoji-group"><span class="emoji-group-label">生气</span><button class="emoji-btn" type="button" data-emoji="😠">😠</button><button class="emoji-btn" type="button" data-emoji="😤">😤</button><button class="emoji-btn" type="button" data-emoji="💢">💢</button></div>
            <div class="emoji-group"><span class="emoji-group-label">孤独</span><button class="emoji-btn" type="button" data-emoji="😶‍🌫️">😶‍🌫️</button><button class="emoji-btn" type="button" data-emoji="🥺">🥺</button><button class="emoji-btn" type="button" data-emoji="🌧️">🌧️</button></div>
            <div class="emoji-group"><span class="emoji-group-label">疲惫</span><button class="emoji-btn" type="button" data-emoji="😮‍💨">😮‍💨</button><button class="emoji-btn" type="button" data-emoji="😫">😫</button><button class="emoji-btn" type="button" data-emoji="🫠">🫠</button></div>
            <div class="emoji-group"><span class="emoji-group-label">被理解</span><button class="emoji-btn" type="button" data-emoji="🫂">🫂</button><button class="emoji-btn" type="button" data-emoji="💛">💛</button><button class="emoji-btn" type="button" data-emoji="🤍">🤍</button></div>
            <div class="emoji-group"><span class="emoji-group-label">有希望</span><button class="emoji-btn" type="button" data-emoji="😊">😊</button><button class="emoji-btn" type="button" data-emoji="🌱">🌱</button><button class="emoji-btn" type="button" data-emoji="✨">✨</button></div>
          </div>
          <form class="composer" id="chatForm">
            <button class="plus-btn" id="plusButton" type="button" title="发送表情包" aria-label="发送表情包">+</button>
            <textarea id="input" rows="1" placeholder="把刚才那一瞬间说给我听。按 Enter 发送，Shift + Enter 换行。"></textarea>
            <button class="send-btn" id="sendButton" type="submit">发送</button>
          </form>
        </div>
        <div class="helper"><strong>AI 与隐私：</strong>我是 AI 情绪梳理伙伴，不能替代专业心理或医疗帮助。对话会发送至服务端用于生成回复，并保存在你的浏览器中；无需提供真实身份，请勿输入敏感个人信息。若有迫近危险，请立即联系身边真人和当地紧急服务；中国境内可拨全国统一心理援助热线 <strong>12356</strong>。</div>
      </section>
    </main>
  </div>

  <div class="modal-backdrop" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-modal">
      <div class="settings-head">
        <strong id="settingsTitle">设置</strong>
        <button class="icon-btn" id="closeSettings" type="button" title="关闭" aria-label="关闭">×</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab active" type="button" data-tab="personal">个性化</button>
        <button class="tab" type="button" data-tab="storage">存储</button>
        <button class="tab" type="button" data-tab="memory">记忆</button>
      </div>

      <section class="tab-panel active" id="tab-personal">
        <div class="field-grid">
          <div class="field">
            <label for="aiNameInput">AI 智能体名字</label>
            <input id="aiNameInput" type="text" maxlength="16">
          </div>
          <div class="field">
            <label for="userNameInput">用户名字</label>
            <input id="userNameInput" type="text" maxlength="16">
          </div>
          <div class="field">
            <label for="fontSizeInput">字体大小</label>
            <select id="fontSizeInput">
              <option value="14px">小</option>
              <option value="15px">中</option>
              <option value="17px">大</option>
            </select>
          </div>
          <div class="field">
            <label for="fontFamilyInput">字体</label>
            <select id="fontFamilyInput">
              <option value='-apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif'>系统默认</option>
              <option value='"Microsoft YaHei", sans-serif'>微软雅黑</option>
              <option value='"PingFang SC", "Microsoft YaHei", sans-serif'>苹方</option>
              <option value='"SimHei", "Microsoft YaHei", sans-serif'>黑体</option>
              <option value='"SimSun", "STSong", serif'>宋体</option>
              <option value='"KaiTi", "STKaiti", serif'>楷体</option>
              <option value='"Noto Sans CJK SC", "Microsoft YaHei", sans-serif'>思源黑体</option>
              <option value='Arial, "Microsoft YaHei", sans-serif'>Arial</option>
              <option value='Verdana, "Microsoft YaHei", sans-serif'>Verdana</option>
            </select>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="tab-storage">
        <div class="field-grid">
          <div class="field">
            <label>历史对话记录导出</label>
            <button class="secondary-btn" id="exportChat" type="button">导出当前对话</button>
          </div>
          <div class="field">
            <label>网页缓存的存储地址</label>
            <input type="text" value="浏览器 localStorage：bnu-agent-ui-v5" readonly>
          </div>
        </div>
        <div class="field">
          <label>已删除记录的备份</label>
          <div class="backup-list" id="deletedBackupList"></div>
        </div>
      </section>

      <section class="tab-panel" id="tab-memory">
        <div class="toggle-row">
          <div>
            <strong>开启对话之间记忆</strong>
            <div class="meta">开启后，前端会把你的自我描述放入每次发送给后端的 messages 中。</div>
          </div>
          <label class="switch">
            <input id="memoryToggle" type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="field">
          <label for="selfDescriptionInput">用一段话描述自己</label>
          <textarea id="selfDescriptionInput" placeholder="例如：我是一个在海外读书的学生，比较慢热，害怕别人觉得我尴尬，但我也想慢慢练习真实社交。"></textarea>
        </div>
      </section>
    </div>
  </div>

  <script>
    const PRODUCTION_BACKEND = "https://bnu-agent-6.onrender.com";
    const LOCAL_HOSTS = new Set(["localhost", "127.0.0.1"]);
    const BACKEND = location.protocol === "file:" || LOCAL_HOSTS.has(location.hostname)
      ? "http://localhost:8000" : PRODUCTION_BACKEND;
    const REQUIRED_BACKEND_VERSION = "3.3.0";
    const STORE_KEY = "bnu-agent-ui-v5";
    const FALLBACK_REPLY = "连接暂时中断了，这条消息还没能得到完整回应。你可以稍后重试，刚才写下的内容仍保存在当前对话中。";
    const CRISIS_FALLBACK_REPLY = "我现在无法连接后端。请先联系身边可信任的人、学校心理咨询中心或当地紧急服务；如果你在中国，也可以拨打全国统一心理援助热线 12356。";
    const STALE_BACKEND_REPLY = "服务仍在运行旧版本，刚才的消息没有发送给旧规则。请重启后端服务后再试；你的文字已经保存在当前对话中。";

    const app = document.getElementById("app");
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("input");
    const sendButton = document.getElementById("sendButton");
    const crisisButton = document.getElementById("crisisButton");
    const stageText = document.getElementById("stageText");
    const sessionTitle = document.getElementById("sessionTitle");
    const newChat = document.getElementById("newChat");
    const historyList = document.getElementById("historyList");
    const collapseSidebar = document.getElementById("collapseSidebar");
    const settingsButton = document.getElementById("settingsButton");
    const settingsModal = document.getElementById("settingsModal");
    const closeSettings = document.getElementById("closeSettings");
    const plusButton = document.getElementById("plusButton");
    const emojiPanel = document.getElementById("emojiPanel");
    const exportChat = document.getElementById("exportChat");
    const deletedBackupList = document.getElementById("deletedBackupList");
    const aiNameInput = document.getElementById("aiNameInput");
    const userNameInput = document.getElementById("userNameInput");
    const fontSizeInput = document.getElementById("fontSizeInput");
    const fontFamilyInput = document.getElementById("fontFamilyInput");
    const memoryToggle = document.getElementById("memoryToggle");
    const selfDescriptionInput = document.getElementById("selfDescriptionInput");

    const defaultState = {
      currentId: "",
      collapsed: false,
      settings: {
        aiName: "情绪梳理伙伴",
        userName: "我",
        fontSize: "15px",
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif',
        memoryEnabled: false,
        selfDescription: ""
      },
      conversations: [],
      deleted: []
    };

    let state = loadState();
    let sending = false;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORE_KEY));
        return { ...defaultState, ...saved, settings: { ...defaultState.settings, ...(saved && saved.settings) } };
      } catch (error) {
        return JSON.parse(JSON.stringify(defaultState));
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function createConversation() {
      const id = "c-" + Date.now();
      const conversation = { id, title: "新对话", messages: [], createdAt: Date.now(), updatedAt: Date.now() };
      state.conversations.unshift(conversation);
      state.currentId = id;
      saveState();
      return conversation;
    }

    function currentConversation() {
      let conversation = state.conversations.find((item) => item.id === state.currentId);
      if (!conversation) conversation = createConversation();
      return conversation;
    }

    function getOpening() {
      return `嗨，我是${state.settings.aiName}。\n\n如果你愿意，可以把心里的事跟我说说。我不会替你下结论，也不会急着给建议。我们可以先从刚才最让你难受的一瞬间开始。`;
    }

    function applySettings() {
      document.documentElement.style.setProperty("--font-size", state.settings.fontSize);
      document.body.style.fontFamily = state.settings.fontFamily;
      aiNameInput.value = state.settings.aiName;
      userNameInput.value = state.settings.userName;
      fontSizeInput.value = state.settings.fontSize;
      fontFamilyInput.value = state.settings.fontFamily;
      memoryToggle.checked = state.settings.memoryEnabled;
      selfDescriptionInput.value = state.settings.selfDescription;
      app.classList.toggle("sidebar-collapsed", state.collapsed);
      collapseSidebar.title = state.collapsed ? "展开侧边栏" : "收起侧边栏";
      collapseSidebar.setAttribute("aria-label", collapseSidebar.title);
    }

    function setSending(value) {
      sending = value;
      sendButton.disabled = value;
      crisisButton.disabled = value;
      document.querySelectorAll(".quick-btn").forEach((button) => {
        button.disabled = value;
      });
    }

    function renderMessage(role, text, options = {}) {
      const item = document.createElement("div");
      item.className = "message " + role + (options.crisis ? " crisis" : "") + (options.thinking ? " thinking" : "");

      const avatarStack = document.createElement("div");
      avatarStack.className = "avatar-stack";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "我" : role === "system" ? "" : "AI";

      const avatarName = document.createElement("div");
      avatarName.className = "avatar-name";
      avatarName.textContent = role === "user" ? state.settings.userName : state.settings.aiName;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      if (options.thinking) {
        const label = document.createElement("span");
        label.textContent = "正在思考";
        const dots = document.createElement("span");
        dots.className = "thinking-dots";
        dots.innerHTML = "<span></span><span></span><span></span>";
        bubble.appendChild(label);
        bubble.appendChild(dots);
      } else {
        bubble.textContent = text;
      }

      avatarStack.appendChild(avatar);
      avatarStack.appendChild(avatarName);
      item.appendChild(avatarStack);
      item.appendChild(bubble);
      messagesEl.appendChild(item);
      messagesEl.parentElement.scrollTop = messagesEl.parentElement.scrollHeight;
      return item;
    }

    function renderCurrentConversation() {
      const conversation = currentConversation();
      messagesEl.innerHTML = "";
      sessionTitle.textContent = conversation.title === "新对话" ? "今天想聊点什么？" : conversation.title;
      stageText.textContent = "阶段：等待输入";

      if (conversation.messages.length === 0) {
        renderMessage("assistant", getOpening());
      } else {
        conversation.messages.forEach((message) => renderMessage(message.role, message.content, message.options || {}));
      }
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";
      const conversations = state.conversations.filter((item) => item.messages.length > 0 || item.id === state.currentId);
      if (conversations.length === 0) {
        const empty = document.createElement("div");
        empty.className = "meta";
        empty.textContent = "暂无历史";
        historyList.appendChild(empty);
        return;
      }

      conversations.forEach((conversation) => {
        const row = document.createElement("div");
        row.className = "history-item" + (conversation.id === state.currentId ? " active" : "");

        const title = document.createElement("button");
        title.className = "history-title";
        title.type = "button";
        title.textContent = conversation.title;
        title.addEventListener("click", () => {
          state.currentId = conversation.id;
          saveState();
          renderCurrentConversation();
        });

        const trash = document.createElement("button");
        trash.className = "trash-btn";
        trash.type = "button";
        trash.title = "删除对话";
        trash.setAttribute("aria-label", "删除对话");
        trash.textContent = "🗑";
        trash.addEventListener("click", () => deleteConversation(conversation.id));

        row.appendChild(title);
        row.appendChild(trash);
        historyList.appendChild(row);
      });
    }

    function renderDeletedBackups() {
      deletedBackupList.innerHTML = "";
      if (state.deleted.length === 0) {
        const empty = document.createElement("div");
        empty.className = "backup-item";
        empty.textContent = "暂无已删除记录备份";
        deletedBackupList.appendChild(empty);
        return;
      }
      state.deleted.slice(0, 8).forEach((item) => {
        const backup = document.createElement("div");
        backup.className = "backup-item";
        backup.textContent = `${item.title} · ${new Date(item.deletedAt).toLocaleString()}`;
        deletedBackupList.appendChild(backup);
      });
    }

    function updateConversationTitle(conversation) {
      const firstUser = conversation.messages.find((message) => message.role === "user");
      if (firstUser) conversation.title = firstUser.content.slice(0, 18) || "新对话";
    }

    function saveMessage(role, content, options = {}) {
      const conversation = currentConversation();
      conversation.messages.push({ role, content, options });
      conversation.updatedAt = Date.now();
      updateConversationTitle(conversation);
      saveState();
      renderHistory();
    }

    function deleteConversation(id) {
      const target = state.conversations.find((item) => item.id === id);
      if (!target) return;
      state.deleted.unshift({ ...target, deletedAt: Date.now() });
      state.conversations = state.conversations.filter((item) => item.id !== id);
      if (state.currentId === id) {
        state.currentId = "";
        createConversation();
      }
      saveState();
      renderCurrentConversation();
      renderDeletedBackups();
    }

    function startNewConversation() {
      createConversation();
      saveState();
      renderCurrentConversation();
      input.focus();
    }

    function buildRequestMessages(conversation) {
      const messages = conversation.messages
        .filter((message) => {
          if (message.role !== "user" && message.role !== "assistant") return false;
          if (message.role === "assistant" && message.options && message.options.crisis) return false;
          return true;
        })
        .map((message) => ({ role: message.role, content: message.content }));
      if (state.settings.memoryEnabled && state.settings.selfDescription.trim()) {
        messages.unshift({
          role: "user",
          content: `【用户自我描述，请作为长期背景理解，不要直接复述】${state.settings.selfDescription.trim()}`
        });
      }
      return messages;
    }

    function isExplicitLocalCrisis(text) {
      return /我.{0,8}(?:想死|不想活|想自杀|要自杀|想自伤|想自残|伤害自己)|(?:无法|不能|没法)保证.{0,6}安全|需要紧急帮助/.test(text);
    }

    async function ensureBackendVersion() {
      const response = await fetch(BACKEND + "/api/health");
      if (!response.ok) throw new Error("backend-unavailable");
      const data = await response.json();
      if (data.version !== REQUIRED_BACKEND_VERSION) throw new Error("stale-backend");
    }

    async function sendMessage(text) {
      const content = text.trim();
      if (!content || sending) return;

      renderMessage("user", content);
      saveMessage("user", content);
      input.value = "";
      emojiPanel.classList.remove("open");
      setSending(true);
      stageText.textContent = "阶段：等待回复";
      const thinkingMessage = renderMessage("assistant", "", { thinking: true });

      try {
        await ensureBackendVersion();
        const conversation = currentConversation();
        const response = await fetch(BACKEND + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: buildRequestMessages(conversation) })
        });

        if (!response.ok) throw new Error("chat failed");
        const data = await response.json();
        const reply = data.reply || FALLBACK_REPLY;
        const crisis = data.is_crisis || data.safety_light === "red";

        thinkingMessage.remove();
        renderMessage("assistant", reply, { crisis });
        saveMessage("assistant", reply, { crisis });
        stageText.textContent = "阶段：" + (data.stage || "已回应");

        if (data.safety_light === "orange") {
          const note = "提示：这可能不是普通的人际摩擦。你可以考虑联系学校国际学生办公室、心理咨询师或可信任的人。";
          renderMessage("system", note);
          saveMessage("system", note);
        }

      } catch (error) {
        thinkingMessage.remove();
        const localCrisis = isExplicitLocalCrisis(content);
        const fallback = error.message === "stale-backend"
          ? STALE_BACKEND_REPLY
          : localCrisis ? CRISIS_FALLBACK_REPLY : FALLBACK_REPLY;
        const fallbackCrisis = error.message !== "stale-backend" && localCrisis;
        renderMessage("assistant", fallback, { crisis: fallbackCrisis });
        saveMessage("assistant", fallback, { crisis: fallbackCrisis });
        stageText.textContent = "阶段：fallback";
      } finally {
        setSending(false);
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage(input.value);
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    crisisButton.addEventListener("click", () => {
      sendMessage("我现在很难受，撑不下去了，需要紧急帮助。");
    });

    document.querySelectorAll(".quick-btn").forEach((button) => {
      button.addEventListener("click", () => sendMessage(button.dataset.prompt));
    });

    newChat.addEventListener("click", startNewConversation);

    collapseSidebar.addEventListener("click", () => {
      state.collapsed = !state.collapsed;
      applySettings();
      saveState();
    });

    settingsButton.addEventListener("click", () => {
      renderDeletedBackups();
      settingsModal.classList.add("open");
    });

    closeSettings.addEventListener("click", () => settingsModal.classList.remove("open"));
    settingsModal.addEventListener("click", (event) => {
      if (event.target === settingsModal) settingsModal.classList.remove("open");
    });

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.remove("active"));
        button.classList.add("active");
        document.getElementById("tab-" + button.dataset.tab).classList.add("active");
      });
    });

    plusButton.addEventListener("click", () => {
      emojiPanel.classList.toggle("open");
    });

    document.querySelectorAll(".emoji-btn").forEach((button) => {
      button.addEventListener("click", () => {
        input.value += button.dataset.emoji;
        input.focus();
      });
    });

    exportChat.addEventListener("click", () => {
      const conversation = currentConversation();
      const text = conversation.messages.map((message) => `${message.role}: ${message.content}`).join("\n\n");
      const blob = new Blob([text || "暂无对话"], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "chat-history.txt";
      link.click();
      URL.revokeObjectURL(url);
    });

    aiNameInput.addEventListener("input", () => {
      state.settings.aiName = aiNameInput.value.trim() || "情绪梳理伙伴";
      saveState();
      renderCurrentConversation();
    });

    userNameInput.addEventListener("input", () => {
      state.settings.userName = userNameInput.value.trim() || "我";
      saveState();
      renderCurrentConversation();
    });

    fontSizeInput.addEventListener("change", () => {
      state.settings.fontSize = fontSizeInput.value;
      applySettings();
      saveState();
    });

    fontFamilyInput.addEventListener("change", () => {
      state.settings.fontFamily = fontFamilyInput.value;
      applySettings();
      saveState();
    });

    memoryToggle.addEventListener("change", () => {
      state.settings.memoryEnabled = memoryToggle.checked;
      saveState();
    });

    selfDescriptionInput.addEventListener("input", () => {
      state.settings.selfDescription = selfDescriptionInput.value;
      saveState();
    });

    if (!state.currentId || state.conversations.length === 0) createConversation();
    applySettings();
    renderCurrentConversation();
  </script>
</body>
</html>
